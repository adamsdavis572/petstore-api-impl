name: Build and Deploy to Azure App Service

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  AZURE_WEBAPP_NAME: petstore-api-impl   # Change to your Azure Web App name
  DOTNET_VERSION: '8.0.x'
  PROJECT_PATH: src/PetstoreApi/PetstoreApi.csproj

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up .NET ${{ env.DOTNET_VERSION }}
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore NuGet packages
        run: dotnet restore ${{ env.PROJECT_PATH }}
        env:
          NUGET_GITHUB_PAT: ${{ secrets.NUGET_GITHUB_PAT }}

      - name: Build
        run: dotnet build ${{ env.PROJECT_PATH }} --configuration Release --no-restore

      - name: Publish
        run: dotnet publish ${{ env.PROJECT_PATH }} --configuration Release --no-build --output ./publish

      - name: Zip publish output
        run: cd ./publish && zip -r ../publish.zip .

      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy via ZipDeploy
        run: |
          az webapp deployment source config-zip \
            --name ${{ env.AZURE_WEBAPP_NAME }} \
            --resource-group petstore-rg \
            --src publish.zip
